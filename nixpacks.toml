[phases.setup]
nixPkgs = ["nodejs_22"]
cmds = ["corepack enable && corepack prepare pnpm@10.26.1 --activate"]

[phases.install]
cmds = ["pnpm install --frozen-lockfile"]

[phases.build]
cmds = [
  "pnpm --filter @workspace/uk-health-visa run build",
  "pnpm --filter @workspace/api-server run build"
]

[start]
cmd = "node artifacts/api-server/dist/index.cjs"
