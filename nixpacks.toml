[phases.setup]
nixPkgs = ["nodejs_22"]
cmds = ["npm install -g pnpm@9"]

[phases.install]
cmds = ["pnpm install --frozen-lockfile"]

[phases.build]
cmds = [
  "pnpm --filter @workspace/uk-health-visa run build",
  "pnpm --filter @workspace/api-server run build"
]

[start]
cmd = "node artifacts/api-server/dist/index.cjs"
