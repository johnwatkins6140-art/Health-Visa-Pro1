kind = "web"
previewPath = "/"
title = "UK Health Visa Application"
version = "1.0.0"
id = "artifacts/uk-health-visa"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 23069
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/uk-health-visa run dev"

[services.env]
PORT = "23069"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/uk-health-visa", "run", "build"]
publicDir = "artifacts/uk-health-visa/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
